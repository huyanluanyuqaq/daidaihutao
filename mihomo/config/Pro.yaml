# иҮӘе®ҡд№үд»ЈзҗҶиҠӮзӮ№
proxies:
  # - name: "ss1"
  #   type: ss
  #   server: server
  #   port: 443
  #   cipher: aes-128-gcm
  #   password: password

# еҹәзЎҖи®ҫзҪ®
mode: rule
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
ipv6: false
allow-lan: true
unified-delay: true
tcp-concurrent: true
log-level: silent
bind-address: "*"
find-process-mode: "always"
keep-alive-interval: 15
keep-alive-idle: 600
authentication: [mihomo:hutao]
skip-auth-prefixes: [127.0.0.1/8, "::1/128"]
experimental: {quic-go-disable-gso: true}

# жҺ§еҲ¶йқўжқҝ
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip
external-ui-name: zashboard
external-ui: ui
external-controller: 127.0.0.1:9090
secret: hutao
profile: {store-selected: true, store-fake-ip: true}

# жөҒйҮҸе—…жҺў
sniffer:
  enable: true
  sniff:
    HTTP:  {ports: [80, 8080-8880], override-destination: true}
    TLS:   {ports: [443, 8443]}
    QUIC:  {ports: [443, 8443]}
  skip-domain: ["Mijia Cloud", "+.push.apple.com"]

# TUNжЁЎејҸ
tun:
  enable: true
  stack: system
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

# DNSи®ҫзҪ®
dns:
  enable: true
  listen: 7874
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-filter-mode: rule
  fake-ip-range: 198.18.0.1/16
  default-nameserver: [119.29.29.29, 180.184.1.1, 223.5.5.5]
  nameserver: [https://dns.alidns.com/dns-query, https://doh.pub/dns-query]
  fake-ip-filter: [+.miwifi.com, +.docker.io, +.market.xiaomi.com, +.push.apple.com, 'rule-set:Private', 'rule-set:China']

