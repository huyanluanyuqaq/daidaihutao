# 锚点配置
x-base-provider: &base-provider {type: http, interval: 86400, health-check: {enable: true, url: "https://www.gstatic.com/generate_204", interval: 300}, filter: "^(?!.*(群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author))"}

x-url-test:   &url-test { type: url-test, url: "https://www.gstatic.com/generate_204", interval: 300, empty-fallback: REJECT, include-all: true, hidden: true, tolerance: 50 }
x-fallback:   &fallback { type: fallback, url: "https://www.gstatic.com/generate_204", interval: 300, empty-fallback: REJECT }

x-filter-hk:  &filter-hk    "(?i)港|hk|hongkong|hong kong|九龙|kowloon|中环|central|铜锣湾|causeway.?bay|尖沙咀|tsim sha tsui|香港岛"
x-filter-tw:  &filter-tw    "(?i)台|tw|taiwan|taipei|高雄|kaohsiung|台中|taichung|台南|tainan|桃园|taoyuan"
x-filter-jp:  &filter-jp    "(?i)日|jp|japan|tokyo|大阪|osaka|名古屋|nagoya|札幌|sapporo|福冈|fukuoka|冲绳|okinawa"
x-filter-sg:  &filter-sg    "(?i)新|sg|singapore|滨海湾|marina bay|樟宜|changi"
x-filter-kr:  &filter-kr    "(?i)韩|kr|korea|seoul|釜山|busan|仁川|incheon|大邱|daegu"
x-filter-us:  &filter-us    "(?i)美|us|usa|america|united states|纽约|new.?york|洛杉矶|los angeles|旧金山|san.?francisco|芝加哥|chicago|西雅图|seattle|达拉斯|dallas|迈阿密|miami|圣何塞|san.?jose|硅谷|silicon.?valley|凤凰城|phoenix|丹佛|denver|亚特兰大|atlanta|波特兰|portland"

x-oversea:   &oversea   [故障转移, 节点选择, 香港节点, 台湾节点, 日本节点, 狮城节点, 韩国节点, 美国节点, DIRECT]
x-direct:    &direct    [DIRECT, 故障转移, 节点选择, 香港节点, 台湾节点, 日本节点, 狮城节点, 韩国节点, 美国节点]
x-us-first:  &us-first  [美国节点, 故障转移, 节点选择, 香港节点, 台湾节点, 日本节点, 狮城节点, 韩国节点]
x-hk-first:  &hk-first  [香港节点, 故障转移, 节点选择, 台湾节点, 日本节点, 狮城节点, 韩国节点, 美国节点]
x-sg-first:  &sg-first  [狮城节点, 故障转移, 节点选择, 香港节点, 台湾节点, 日本节点, 韩国节点, 美国节点]
x-jp-first:  &jp-first  [日本节点, 故障转移, 节点选择, 香港节点, 台湾节点, 狮城节点, 韩国节点, 美国节点]

x-rule-set-domain: &rule-set-domain { type: http, behavior: domain, format: mrs, interval: 86400 }
x-rule-set-ipcidr: &rule-set-ipcidr { type: http, behavior: ipcidr, format: mrs, interval: 86400 }

proxy-providers:
  Primary: {<<: *base-provider, url: "YOUR_PRIMARY_URL", override: {additional-prefix: "[P] "}}
  Backup:   {<<: *base-provider, url: "YOUR_BACKUP_URL",  override: {additional-prefix: "[B] "}}

# 自定义代理节点
proxies:
  # - name: "ss1"
  #   type: ss
  #   server: server
  #   port: 443
  #   cipher: aes-128-gcm
  #   password: password

# 基础设置
mode: rule
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
ipv6: false
allow-lan: true
unified-delay: true
tcp-concurrent: true
log-level: silent
bind-address: "*"
find-process-mode: "always"
keep-alive-interval: 15
keep-alive-idle: 600
authentication: [mihomo:hutao]
skip-auth-prefixes: [127.0.0.1/8, "::1/128"]
experimental: {quic-go-disable-gso: true}

# 控制面板
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip
external-ui-name: zashboard
external-ui: ui
external-controller: 127.0.0.1:9090
secret: hutao
profile: {store-selected: true, store-fake-ip: true}

# 流量嗅探
sniffer:
  enable: true
  sniff:
    HTTP:  {ports: [80, 8080-8880], override-destination: true}
    TLS:   {ports: [443, 8443]}
    QUIC:  {ports: [443, 8443]}
  skip-domain: ["Mijia Cloud", "+.push.apple.com"]

# TUN模式
tun:
  enable: true
  stack: system
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

# DNS设置
dns:
  enable: true
  listen: 7874
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-filter-mode: rule
  fake-ip-range: 198.18.0.1/16
  default-nameserver: [119.29.29.29, 180.184.1.1, 223.5.5.5]
  nameserver: [https://dns.alidns.com/dns-query, https://doh.pub/dns-query]
  fake-ip-filter:
    - DOMAIN-SUFFIX,miwifi.com,real-ip
    - DOMAIN-SUFFIX,docker.io,real-ip
    - DOMAIN-SUFFIX,market.xiaomi.com,real-ip
    - DOMAIN-SUFFIX,push.apple.com,real-ip
    - RULE-SET,Private,real-ip
    - RULE-SET,China,real-ip
    - MATCH,fake-ip

# 代理策略组
proxy-groups:
  # 路由策略
  - { name: Telegram, type: select, proxies: *sg-first, icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Telegram_X.png }
  - { name: Socialmedia, type: select, proxies: *us-first, icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Twitter.png }
  - { name: Cusproxy, type: select, proxies: *oversea, icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Global.png }
  - { name: Cusdirect, type: select, proxies: *direct, icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/China.png }
  - { name: Ai, type: select, proxies: *us-first, icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/AI.png }
  - { name: Develop, type: select, proxies: *us-first, icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/GitHub.png }
  - { name: Streaming, type: select, proxies: *us-first, icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Streaming.png }
  - { name: Apple, type: select, proxies: *us-first, icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Apple_1.png }
  - { name: Paypal, type: select, proxies: *us-first, icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/PayPal.png }
  - { name: Proxy, type: select, proxies: *oversea, icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Global.png }
  - { name: China, type: select, proxies: *direct, icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/China.png }
  - { name: Final, type: select, proxies: *oversea, icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Final.png }

  # 自动选择
  - { name: 故障转移, <<: *fallback, proxies: [美国节点, 日本节点, 狮城节点, 韩国节点, 香港节点, 台湾节点], icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/ULB.png }

  # 手动选择
  - { name: 节点选择, type: select, include-all: true, icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Clubhouse.png }

  # 区域测速
  - { name: 香港节点, <<: *url-test, filter: *filter-hk, icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hong_Kong.png }
  - { name: 台湾节点, <<: *url-test, filter: *filter-tw, icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Taiwan.png }
  - { name: 日本节点, <<: *url-test, filter: *filter-jp, icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Japan.png }
  - { name: 狮城节点, <<: *url-test, filter: *filter-sg, icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Singapore.png }
  - { name: 韩国节点, <<: *url-test, filter: *filter-kr, icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Korea.png }
  - { name: 美国节点, <<: *url-test, filter: *filter-us, icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png }

# 规则路由
rules:
  # 1. 本地/私有
  - RULE-SET,Private,DIRECT
  - RULE-SET,PrivateIP,DIRECT,no-resolve

  # 2. 高优先级特定服务
  - RULE-SET,TM,Telegram
  - RULE-SET,Telegram,Telegram
  - RULE-SET,TelegramIP,Telegram,no-resolve
  # 自定义策略
  - RULE-SET,Cusproxy,Cusproxy
  - RULE-SET,Cusdirect,Cusdirect
  - RULE-SET,AI,Ai
  - RULE-SET,AiIP,Ai,no-resolve
  - RULE-SET,Dev,Develop

  # 3. 专属流媒体与社交
  - RULE-SET,Streaming,Streaming
  - RULE-SET,StreamingIP,Streaming,no-resolve
  - RULE-SET,SocialMedia,Socialmedia
  - RULE-SET,SocialMediaIP,Socialmedia,no-resolve

  # 4. 大厂特定服务
  - RULE-SET,Apple,Apple
  - RULE-SET,Paypal,Paypal

  # 5. 通用国外流量
  - RULE-SET,Proxy,Proxy
  - RULE-SET,ProxyIP,Proxy,no-resolve

  # 6. 通用国内流量
  - RULE-SET,China,China
  - RULE-SET,ChinaIP,China,no-resolve

  # 7. 兜底规则
  - MATCH,Final

