  - { name: 美国均衡, <<: *load-balance, filter: *filter-us, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Round_Robin_1.png }

# 规则路由
rules:
  # 1. 本地/私有
  - RULE-SET,Private,DIRECT
  - RULE-SET,PrivateIP,DIRECT,no-resolve

  # 2. 广告拦截
  - RULE-SET,Tracking,Tracking
  - RULE-SET,Advertising,Tracking
  - RULE-SET,AdvertisingIP,Tracking,no-resolve
  - RULE-SET,TrackingIP,Tracking,no-resolve

  # 3. 高优先级特定服务
  - RULE-SET,Ai,Ai
  - RULE-SET,AiIP,Ai,no-resolve
  - RULE-SET,Telegram,Telegram
  - RULE-SET,TelegramIP,Telegram,no-resolve

  # 4. 专属流媒体与社交
  - RULE-SET,Youtube,Youtube
  - RULE-SET,YoutubeIP,Youtube,no-resolve
  - RULE-SET,Streaming,Streaming
  - RULE-SET,StreamingIP,Streaming,no-resolve
  - RULE-SET,Embydirect,Embydirect
  - RULE-SET,Emby,EMBY
  - RULE-SET,Socialmedia,Socialmedia
  - RULE-SET,SocialmediaIP,Socialmedia,no-resolve

  # 5. 特殊垂直领域
  - RULE-SET,Crypto,Crypto
  - RULE-SET,Dev,Develop
  - RULE-SET,Speedtest,Speedtest

  # 6. 大厂特定服务
  - RULE-SET,Google,Google
  - RULE-SET,GoogleIP,Google,no-resolve
  - RULE-SET,Applecn,China
  - RULE-SET,Apple,Apple
  - RULE-SET,AppleIP,Apple,no-resolve
  - RULE-SET,Microsoft,Microsoft

  # 7. QUIC / UDP 443 管控
  - AND,((DST-PORT,443),(NETWORK,UDP),(NOT,((GEOIP,CN,no-resolve)))),Tracking

  # 8. 通用国外流量
  - RULE-SET,Proxy,Proxy
  - RULE-SET,ProxyIP,Proxy,no-resolve

  # 9. 通用国内流量
  - RULE-SET,China,China
  - RULE-SET,ChinaIP,China,no-resolve

  # 10. 兜底规则
  - MATCH,Final

