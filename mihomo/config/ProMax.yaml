# 基础设置
mode: rule
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
ipv6: false
allow-lan: true
unified-delay: true
tcp-concurrent: true
log-level: info
bind-address: '*'
find-process-mode: off
keep-alive-interval: 15
keep-alive-idle: 600
authentication: [mihomo:hutao]
skip-auth-prefixes: [127.0.0.1/8, '::1/128']
experimental: {quic-go-disable-gso: true}

# 控制面板
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip
external-ui-name: zashboard
external-ui: ui
external-controller: 0.0.0.0:9090
secret: hutao
profile: {store-selected: true, store-fake-ip: true}

# 流量嗅探
sniffer:
  enable: true
  sniff:
    HTTP:  {ports: [80, 8080-8880], override-destination: true}
    TLS:   {ports: [443, 8443]}
    QUIC:  {ports: [443, 8443]}
  skip-domain: ["Mijia Cloud", "+.push.apple.com"]

# TUN模式
tun:
  enable: true
  stack: system
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: true
  auto-redirect: false
  auto-detect-interface: true
  endpoint-independent-nat: true

# DNS设置
dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-filter-mode: rule
  fake-ip-range: 198.18.0.1/16
  default-nameserver: [119.29.29.29, 180.184.1.1, 223.5.5.5]
  nameserver: [https://dns.alidns.com/dns-query, https://doh.pub/dns-query]
  fake-ip-filter:
    - DOMAIN-SUFFIX,miwifi.com,real-ip
    - DOMAIN-SUFFIX,docker.io,real-ip
    - DOMAIN-SUFFIX,market.xiaomi.com,real-ip
    - DOMAIN-SUFFIX,push.apple.com,real-ip
    - RULE-SET,Private,real-ip
    - RULE-SET,Applecn,real-ip
    - RULE-SET,Selfdirect,real-ip
    - RULE-SET,Embydirect,real-ip
    - RULE-SET,Cusdirect,real-ip
    - RULE-SET,China,real-ip
    - RULE-SET,Ai-cn,real-ip
    - RULE-SET,Steam-cn,real-ip
    - MATCH,fake-ip

