# 锚点配置
hutao-base-provider: &base-provider {type: http, interval: 86400, health-check: {enable: true, url: 'https://www.gstatic.com/generate_204', interval: 300}, filter: '^(?!.*(群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAiL|Panel|Channel|Author))'}

hutao-url-test:     &url-test     { type: url-test, url: "https://www.gstatic.com/generate_204", interval: 300, empty-fallback: REJECT, include-all: true, hidden: true, tolerance: 50 }
hutao-load-balance: &load-balance { type: load-balance, url: "https://www.gstatic.com/generate_204", interval: 300, empty-fallback: REJECT, include-all: true, hidden: true, strategy: consistent-hashing }
hutao-fallback:     &fallback     { type: fallback, url: "https://www.gstatic.com/generate_204", interval: 300, empty-fallback: REJECT }

hutao-filter-hk:    &filter-hk    "(?i)^(?=.*(港|香港|hk|hkg|hongkong|hong kong|🇭🇰))(?!.*(排除|澳门|澳門)).*$"
hutao-filter-tw:    &filter-tw    "(?i)^(?=.*(台|台湾|臺灣|tw|twn|taiwan|taipei|tpe|khh|tsa|🇹🇼))(?!.*(排除)).*$"
hutao-filter-jp:    &filter-jp    "(?i)^(?=.*(日|日本|jp|jpn|japan|tokyo|osaka|东京|大阪|nrt|hnd|kix|cts|fuk|🇯🇵))(?!.*(排除|尼日)).*$"
hutao-filter-sg:    &filter-sg    "(?i)^(?=.*(新加坡|狮城|獅城|sg|sgp|singapore|sin|xsp|🇸🇬))(?!.*(排除|新西兰|紐西蘭|西兰|几内亚|德里|泽西)).*$"
hutao-filter-kr:    &filter-kr    "(?i)^(?=.*(韩|韓國|韩国|韓|kr|kor|korea|seoul|首尔|首爾|icn|gmp|pus|🇰🇷))(?!.*(排除|朝鲜|北朝鲜|北韓)).*$"
hutao-filter-us:    &filter-us    "(?i)^(?=.*(美国|美國|usa|america|united states|lax|sfo|jfk|sjc|sea|ord|iad|dfw|🇺🇸))(?!.*(排除)).*$"

hutao-oversea:      &oversea      [故障转移, 节点选择, 香港节点, 台湾节点, 日本节点, 狮城节点, 韩国节点, 美国节点, DIRECT]
hutao-direct:       &direct       [DIRECT, 故障转移, 节点选择, 香港节点, 台湾节点, 日本节点, 狮城节点, 韩国节点, 美国节点]
hutao-us-first:     &us-first     [美国节点, 故障转移, 节点选择, 香港节点, 台湾节点, 日本节点, 狮城节点, 韩国节点]
hutao-hk-first:     &hk-first     [香港节点, 故障转移, 节点选择, 台湾节点, 日本节点, 狮城节点, 韩国节点, 美国节点]
hutao-sg-first:     &sg-first     [狮城节点, 故障转移, 节点选择, 香港节点, 台湾节点, 日本节点, 韩国节点, 美国节点]
hutao-jp-first:     &jp-first     [日本节点, 故障转移, 节点选择, 香港节点, 台湾节点, 狮城节点, 韩国节点, 美国节点]

hutao-rule-set-domain: &rule-set-domain { type: http, behavior: domain, format: mrs, interval: 86400 }
hutao-rule-set-ipcidr: &rule-set-ipcidr { type: http, behavior: ipcidr, format: mrs, interval: 86400 }

proxy-providers:
  Primary: {<<: *base-provider, url: 'YOUR_PRIMARY_URL', override: {additional-prefix: '[P] '}}
  # Backup:   {<<: *base-provider, url: 'YOUR_BACKUP_URL',  override: {additional-prefix: '[B] '}}
  # Landing:  {<<: *base-provider, url: 'YOUR_LANDING_URL', override: {additional-prefix: '[L] '}}

